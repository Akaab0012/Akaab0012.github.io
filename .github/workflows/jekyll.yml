                        </div>
                        <div class="item-company">天士力医药</div>
                    </div>
                    <div class="category-item">
                        <div class="item-title">
                            <span>康缘药业"银杏二萜内酯"新专利获授权</span>
                            <span class="item-date">11-04</span>
                        </div>
                        <div class="item-company">康缘药业</div>
                    </div>
                    <div class="category-item">
                        <div class="item-title">
                            <span>以岭药业"连花清瘟"儿童剂型获批临床</span>
                            <span class="item-date">11-03</span>
                        </div>
                        <div class="item-company">以岭药业</div>
