    <script>
        // 简单的交互功能
        document.addEventListener('DOMContentLoaded', function() {
            // 搜索标签点击事件
            const tags = document.querySelectorAll('.tag');
            tags.forEach(tag => {
                tag.addEventListener('click', function() {
                    const searchInput = document.querySelector('.search-box input');
                    searchInput.value = this.textContent;
                    searchInput.focus();
                });
            });
            
            // 公司卡片点击事件
            const companyCards = document.querySelectorAll('.company-card');
            companyCards.forEach(card => {
                card.addEventListener('click', function() {
                    const companyName = this.querySelector('h5').textContent;
                    alert(`即将跳转到 ${companyName} 的详细页面`);
                    // 实际应用中这里应该跳转到对应公司的详情页
                });
            });
            
            // 新闻卡片点击事件
            const newsCards = document.querySelectorAll('.hot-news-card, .category-item');
            newsCards.forEach(card => {
                card.addEventListener('click', function() {
                    // 实际应用中这里应该跳转到新闻详情页
                    console.log('跳转到新闻详情');
                });
            });
            
            // 订阅按钮点击事件
            const subscribeBtn = document.querySelector('.btn-subscribe');
            subscribeBtn.addEventListener('click', function() {
                const email = prompt('请输入您的邮箱地址以订阅每日动态：');
                if (email) {
                    alert(`感谢订阅！每日动态将发送到：${email}`);
                }
            });
        });
    </script>
