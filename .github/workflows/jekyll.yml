                        <div class="item-company">康恩贝</div>
                    </div>
                </div>
            </div>
            
            <!-- 业务动态 -->
            <div class="category-card">
                <div class="category-header">
                    <h4><i class="fas fa-chart-line"></i> 业务动态</h4>
                    <span class="category-count">18条</span>
                </div>
                <div class="category-list">
                    <div class="category-item">
                        <div class="item-title">
                            <span>东阿阿胶与日本津村成立合资公司</span>
                            <span class="item-date">11-05</span>
                        </div>
                        <div class="item-company">东阿阿胶</div>
                    </div>
                    <div class="category-item">
                        <div class="item-title">
                            <span>白云山"王老吉"进军东南亚市场</span>
                            <span class="item-date">11-04</span>
                        </div>
                        <div class="item-company">白云山</div>
                    </div>
                    <div class="category-item">
                        <div class="item-title">
                            <span>九芝堂六味地黄丸进入国家基药目录</span>
                            <span class="item-date">11-03</span>
                        </div>
                        <div class="item-company">九芝堂</div>
                    </div>
                    <div class="category-item">
                        <div class="item-title">
                            <span>太极集团藿香正气液提价8%</span>
                            <span class="item-date">11-02</span>
                        </div>
                        <div class="item-company">太极集团</div>
                    </div>
                    <div class="category-item">
                        <div class="item-title">
                            <span>中新药业获GMP认证延期</span>
                            <span class="item-date">11-01</span>
                        </div>
                        <div class="item-company">中新药业</div>
                    </div>
                </div>
            </div>
            
            <!-- 招聘信息 -->
            <div class="category-card">
                <div class="category-header">
                    <h4><i class="fas fa-users"></i> 人才招聘</h4>
                    <span class="category-count">32条</span>
                </div>
                <div class="category-list">
                    <div class="category-item">
                        <div class="item-title">
                            <span>同仁堂招聘中药质量研究员</span>
                            <span class="item-date">11-05</span>
                        </div>
                        <div class="item-company">北京·薪资面议</div>
                    </div>
